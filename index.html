<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamil Podcast Hub</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}

.search-box{
    text-align:center;
    margin:20px;
}

input{
    width:80%;
    max-width:500px;
    padding:10px;
}

.podcast-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

img{
    width:100%;
    border-radius:10px;
}

audio{
    width:100%;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
    <h1>🎙 Tamil Podcast Hub</h1>
    <p>தமிழ் மற்றும் English Podcast Collection</p>
</header>

<div class="search-box">
    <input type="text" id="search"
           placeholder="Search Tamil or English Podcasts..."
           onkeyup="searchPodcast()">
</div>

<div class="podcast-container" id="podcasts">

<div class="card">
    <img src="images/nature1.jpg" alt="Podcast">
    <h3>தமிழ் வரலாறு Podcast</h3>
    <audio controls>
        <source src="audio/podcast1.mp3" type="audio/mpeg">
    </audio>
</div>

<div class="card">
    <img src="images/nature2.jpg" alt="Podcast">
    <h3>English Technology Podcast</h3>
    <audio controls>
        <source src="audio/podcast2.mp3" type="audio/mpeg">
    </audio>
</div>

</div>

<script>
function searchPodcast() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let title = card.querySelector("h3").innerText.toLowerCase();

        if(title.includes(input)){
            card.style.display="block";
        }else{
            card.style.display="none";
        }
    });
}
</script>

</body>
</html>
